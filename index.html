<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Camera Firework Zoom</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        video {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            min-width: 100%;
            min-height: 100%;
            z-index: 1;
            transition: transform 0.1s ease-out;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            pointer-events: none;
        }
        #ui {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<video id="camera" autoplay playsinline></video>
<canvas id="fireworks"></canvas>
<div id="ui">Pinch to Zoom | Tap for Fireworks</div>

<script>
    const video = document.getElementById('camera');
    const canvas = document.getElementById('fireworks');
    const ctx = canvas.getContext('2d');

    let zoomLevel = 1;
    let initialDist = 0;

    // Initialize Camera
    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            video.srcObject = stream;
        } catch (err) {
            console.error("Camera access denied", err);
            document.getElementById('ui').innerText = "Camera Access Denied";
        }
    }

    // Handle Resize
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Pinch to Zoom Logic
    window.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            initialDist = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
        } else if (e.touches.length === 1) {
            createFirework(e.touches[0].pageX, e.touches[0].pageY);
        }
    });

    window.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2) {
            const currentDist = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
            
            const diff = currentDist / initialDist;
            zoomLevel = Math.max(1, Math.min(5, zoomLevel * diff));
            video.style.transform = `translate(-50%, -50%) scale(${zoomLevel})`;
            initialDist = currentDist;
        }
    });

    // Firework Logic
    const particles = [];
    class Particle {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.size = Math.random() * 3 + 1;
            this.speedX = (Math.random() - 0.5) * 10;
            this.speedY = (Math.random() - 0.5) * 10;
            this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
            this.alpha = 1;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.alpha -= 0.02;
        }
        draw() {
            ctx.globalAlpha = this.alpha;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function createFirework(x, y) {
        for (let i = 0; i < 30; i++) {
            particles.push(new Particle(x, y));
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < particles.length; i++) {
            particles[i].update();
            particles[i].draw();
            if (particles[i].alpha <= 0) {
                particles.splice(i, 1);
                i--;
            }
        }
        requestAnimationFrame(animate);
    }

    startCamera();
    animate();
</script>
</body>
</html>
