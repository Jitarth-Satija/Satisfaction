<!DOCTYPE html>
<html>
<head>
    <title>Photorealistic Gesture Universe</title>
    <style>
        body { margin: 0; background: #000; color: white; overflow: hidden; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; border: 1px solid #444; }
        button { background: #00ffcc; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        #status { color: #00ffcc; margin-bottom: 10px; }
        video { display: none; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="status">Status: Waiting for User...</div>
        <button id="startBtn">ENABLE CAMERA & START</button>
        <p style="font-size: 12px; opacity: 0.7;">Pinch fingers to Zoom | Move hand to Rotate</p>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, earth, saturn, rings, stars;
        let handDist = 1;

        // --- 1. Scene Setup ---
        function initScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 5000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Lighting
            const sunLight = new THREE.DirectionalLight(0xffffff, 2);
            sunLight.position.set(5, 3, 5);
            scene.add(sunLight);
            scene.add(new THREE.AmbientLight(0x404040, 1));

            // Stars Background
            const starGeo = new THREE.BufferGeometry();
            const starPos = new Float32Array(30000);
            for(let i=0; i<30000; i++) starPos[i] = (Math.random() - 0.5) * 2000;
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.7}));
            scene.add(stars);

            // Real Earth
            const texLoader = new THREE.TextureLoader();
            const earthMat = new THREE.MeshPhongMaterial({
                map: texLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg'),
                specularMap: texLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_specular_2048.jpg'),
                shininess: 10
            });
            earth = new THREE.Mesh(new THREE.SphereGeometry(2, 64, 64), earthMat);
            scene.add(earth);

            // Real Saturn with Rings
            const saturnMat = new THREE.MeshPhongMaterial({ color: 0xe2bf7d });
            saturn = new THREE.Mesh(new THREE.SphereGeometry(1.2, 32, 32), saturnMat);
            saturn.position.set(8, 0, -5);
            scene.add(saturn);

            // Rings
            const ringGeo = new THREE.RingGeometry(1.5, 2.5, 64);
            const ringMat = new THREE.MeshBasicMaterial({ 
                color: 0xc2a26a, side: THREE.DoubleSide, transparent: true, opacity: 0.6 
            });
            rings = new THREE.Mesh(ringGeo, ringMat);
            rings.rotation.x = Math.PI / 2.2;
            saturn.add(rings);

            camera.position.z = 10;
        }

        // --- 2. Camera & Tracking Setup ---
        async function setupTracking() {
            const status = document.getElementById('status');
            
            // Dynamically load MediaPipe
            await loadScript("https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js");
            await loadScript("https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js");

            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6 });

            hands.onResults((res) => {
                if (res.multiHandLandmarks.length > 0) {
                    status.innerText = "Status: Tracking Active!";
                    const h = res.multiHandLandmarks[0];
                    
                    // Zoom Logic (Thumb to Index distance)
                    const dx = h[4].x - h[8].x;
                    const dy = h[4].y - h[8].y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    
                    camera.position.z = THREE.MathUtils.lerp(camera.position.z, 15 - (dist * 25), 0.1);
                    
                    // Rotate Earth with hand move
                    earth.rotation.y += (h[8].x - 0.5) * 0.1;
                    earth.rotation.x += (h[8].y - 0.5) * 0.1;
                } else {
                    status.innerText = "Status: Show your hand to camera";
                }
            });

            const video = document.createElement('video');
            const cam = new Camera(video, {
                onFrame: async () => { await hands.send({image: video}); },
                width: 640, height: 480
            });
            cam.start();
        }

        function loadScript(url) {
            return new Promise((resolve) => {
                const s = document.createElement('script');
                s.src = url;
                s.onload = resolve;
                document.head.appendChild(s);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if(earth) earth.rotation.y += 0.001;
            if(saturn) saturn.rotation.y += 0.002;
            renderer.render(scene, camera);
        }

        // Initialize
        initScene();
        animate();

        document.getElementById('startBtn').addEventListener('click', () => {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('status').innerText = "Status: Initializing Camera...";
            setupTracking();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
