<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Gesture Particle System</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
    video { display: none; }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-family: sans-serif;
      z-index: 10;
    }
  </style>
</head>
<body>

<div id="info">
  ✊ Pinch = Contract <br>
  ✋ Open = Expand <br>
  1–5 = Change Shapes
</div>

<video id="video" autoplay playsinline></video>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
let scene, camera, renderer, particles;
let positions, colors;
let particleCount = 2000;

let scaleFactor = 1;
let targetScale = 1;
let currentShape = 0;

init();
initHandTracking();
animate();

function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 5;

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const geometry = new THREE.BufferGeometry();

  positions = new Float32Array(particleCount * 3);
  colors = new Float32Array(particleCount * 3);

  generateShape();

  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const material = new THREE.PointsMaterial({
    size: 0.03,
    vertexColors: true,
    blending: THREE.AdditiveBlending,
    transparent: true
  });

  particles = new THREE.Points(geometry, material);
  scene.add(particles);

  window.addEventListener("keydown", (e) => {
    if (e.key >= "1" && e.key <= "5") {
      currentShape = parseInt(e.key) - 1;
      generateShape();
      particles.geometry.attributes.position.needsUpdate = true;
    }
  });
}

function generateShape() {
  for (let i = 0; i < particleCount; i++) {
    let x, y, z;

    switch(currentShape) {

      // ❤️ HEART
      case 0:
        let t = Math.random() * Math.PI * 2;
        x = 16 * Math.pow(Math.sin(t), 3);
        y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
        z = (Math.random() - 0.5) * 5;
        break;

      // 🌸 FLOWER
      case 1:
        let angle = Math.random() * Math.PI * 2;
        let r = Math.sin(6 * angle);
        x = r * Math.cos(angle) * 5;
        y = r * Math.sin(angle) * 5;
        z = (Math.random() - 0.5) * 3;
        break;

      // 🪐 SATURN
      case 2:
        let theta = Math.random() * Math.PI * 2;
        let radius = 2 + Math.random();
        x = radius * Math.cos(theta);
        y = (Math.random() - 0.5) * 0.3;
        z = radius * Math.sin(theta);
        break;

      // 🎆 FIREWORK
      case 3:
        let phi = Math.random() * Math.PI * 2;
        let costheta = Math.random() * 2 - 1;
        let u = Math.random();
        let rad = Math.cbrt(u) * 3;
        x = rad * Math.sqrt(1 - costheta*costheta) * Math.cos(phi);
        y = rad * Math.sqrt(1 - costheta*costheta) * Math.sin(phi);
        z = rad * costheta;
        break;

      // 🌌 GALAXY
      case 4:
        let spiral = Math.random() * 5;
        let ang = spiral * Math.PI;
        let dist = spiral;
        x = dist * Math.cos(ang);
        y = (Math.random() - 0.5) * 0.5;
        z = dist * Math.sin(ang);
        break;
    }

    positions[i*3] = x;
    positions[i*3+1] = y;
    positions[i*3+2] = z;

    colors[i*3] = Math.random();
    colors[i*3+1] = Math.random();
    colors[i*3+2] = Math.random();
  }
}

function animate() {
  requestAnimationFrame(animate);

  scaleFactor += (targetScale - scaleFactor) * 0.1;

  particles.rotation.y += 0.002;

  let pos = particles.geometry.attributes.position.array;
  let col = particles.geometry.attributes.color.array;

  for (let i = 0; i < particleCount; i++) {
    pos[i*3] *= scaleFactor;
    pos[i*3+1] *= scaleFactor;
    pos[i*3+2] *= scaleFactor;

    col[i*3] = (Math.sin(Date.now()*0.001 + i)*0.5 + 0.5);
    col[i*3+1] = (Math.cos(Date.now()*0.001 + i)*0.5 + 0.5);
  }

  particles.geometry.attributes.position.needsUpdate = true;
  particles.geometry.attributes.color.needsUpdate = true;

  renderer.render(scene, camera);
}

function initHandTracking() {
  const video = document.getElementById('video');

  const hands = new Hands({
    locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
  });

  hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.5
  });

  hands.onResults(results => {
    if (results.multiHandLandmarks.length > 0) {
      const lm = results.multiHandLandmarks[0];

      const thumb = lm[4];
      const index = lm[8];

      const dx = thumb.x - index.x;
      const dy = thumb.y - index.y;

      const dist = Math.sqrt(dx*dx + dy*dy);

      targetScale = 0.5 + dist * 3;
    }
  });

  const cam = new Camera(video, {
    onFrame: async () => {
      await hands.send({ image: video });
    },
    width: 640,
    height: 480
  });

  cam.start();
}
</script>

</body>
</html>
