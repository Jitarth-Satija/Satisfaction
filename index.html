<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satisfaction</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; }
        #info {
            position: absolute; top: 10px; left: 10px; color: white;
            pointer-events: none; text-shadow: 1px 1px 2px black;
            line-height: 1.7;
        }
        #video-container { position: absolute; bottom: 10px; right: 10px; width: 160px; height: 120px; border: 2px solid #444; }
        video { transform: scaleX(-1); width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <audio id="bg-music" loop>
        <source src="your-music-file.mp3" type="audio/mpeg">
    </audio>
    
    <div id="overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000;">
        <img src="logo.png" alt="Icon" style="width: 120px; margin-bottom: 20px; border-radius: 50%; border: 2px solid #fff;">
        <button onclick="startApp()" style="padding: 15px 30px; font-size: 18px; cursor: pointer; background: #444; color: white; border: none; border-radius: 5px;">Click Here and Start Satisfaction Game</button>
    </div>

    <div id="info">
        Satisfaction Game has Started<br>
        🤌 Pinch → Zoom OUT &nbsp;|&nbsp; 🖐 Unpinch → Zoom IN<br>
        ☝️ 1 Finger point → Change Shape
    </div>
    <div id="video-container">
        <video id="input_video"></video>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        function startApp() {
            const music = document.getElementById('bg-music');
            music.volume = 0.3;
            music.play();
            document.getElementById('overlay').style.display = 'none';
            cameraFeed.start();
        }
        const videoElement = document.getElementById('input_video');
        let scene, camera, renderer, particles, geometry;
        let particleCount = 15000;
        let currentShape = 0;
        const shapes = [
            'fireworks', 'heart', 'flower', 'spiral', 'wave', 'galaxy', 'saturn',
            'cube', 'sphere', 'torus', 'star', 'dna', 'tree', 'tornado',
            'infinity', 'butterfly', 'diamond', 'comet', 'phoenix', 'lissajous',
            'helix', 'mandala', 'supernova', 'vortex', 'ribbon', 'crown',
            'jellyfish', 'dragonfly', 'rose', 'nautilus', 'hypercube',
            'mobius', 'shockwave', 'snowflake', 'lotus', 'hourglass', 'volcano'
        ];

        let currentZoom = 5;
        const ZOOM_IN_Z  = 3;
        const ZOOM_OUT_Z = 9;

        let lastShapeChange = 0;
        const SHAPE_COOLDOWN = 1200;

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = currentZoom;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount * 3; i++) {
                positions[i] = (Math.random() - 0.5) * 10;
                colors[i] = Math.random();
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.05,
                vertexColors: true,
                transparent: true,
                blending: THREE.AdditiveBlending
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }

        function updateShape(type, strength = 1) {
            const positions = geometry.attributes.position.array;
            const now = performance.now() * 0.001;

            for (let i = 0; i < particleCount; i++) {
                let x, y, z;
                const t = i / particleCount * Math.PI * 2;
                const r = 2 + Math.random() * 0.5 * strength;
                const n = i / particleCount;

                if (type === 'heart') {
                    x = 16 * Math.pow(Math.sin(t), 3) / 10;
                    y = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) / 10;
                    z = (Math.random() - 0.5) * strength;

                } else if (type === 'flower') {
                    const petals = 5;
                    const radius = 2 * Math.cos(petals * t);
                    x = radius * Math.cos(t);
                    y = radius * Math.sin(t);
                    z = (Math.random() - 0.5) * strength;

                } else if (type === 'spiral') {
                    const radius = 0.02 * i;
                    x = radius * Math.cos(t * 5);
                    y = radius * Math.sin(t * 5);
                    z = (i / particleCount) * 3;

                } else if (type === 'wave') {
                    x = (i / particleCount) * 5 - 2.5;
                    y = Math.sin(x * 5 + performance.now() * 0.002);
                    z = Math.cos(x * 5);

                } else if (type === 'galaxy') {
                    const arms = 3;
                    const angle = t * arms;
                    const radius = Math.sqrt(i) * 0.1;
                    x = Math.cos(angle) * radius;
                    y = Math.sin(angle) * radius;
                    z = (Math.random() - 0.5) * 0.5;

                } else if (type === 'saturn') {
                    if (i < particleCount * 0.6) {
                        const phi = Math.acos(-1 + (2 * i) / (particleCount * 0.6));
                        const theta = Math.sqrt(particleCount * 0.6 * Math.PI) * phi;
                        x = Math.cos(theta) * Math.sin(phi) * 1.5;
                        y = Math.sin(theta) * Math.sin(phi) * 1.5;
                        z = Math.cos(phi) * 1.5;
                    } else {
                        const ringR = 2.5 + Math.random() * 1.5;
                        x = Math.cos(t * 50) * ringR;
                        y = Math.sin(t * 50) * ringR * 0.3;
                        z = Math.sin(t * 50) * ringR * 0.5;
                    }

                } else if (type === 'cube') {
                    const face = i % 6;
                    const u = (Math.random() - 0.5) * 2;
                    const v = (Math.random() - 0.5) * 2;
                    const s = 1.5;
                    if (face === 0) { x = u*s; y = v*s; z = s; }
                    else if (face === 1) { x = u*s; y = v*s; z = -s; }
                    else if (face === 2) { x = s; y = u*s; z = v*s; }
                    else if (face === 3) { x = -s; y = u*s; z = v*s; }
                    else if (face === 4) { x = u*s; y = s; z = v*s; }
                    else { x = u*s; y = -s; z = v*s; }

                } else if (type === 'sphere') {
                    const phi2 = Math.acos(-1 + 2 * n);
                    const theta2 = Math.sqrt(particleCount * Math.PI) * phi2;
                    x = Math.cos(theta2) * Math.sin(phi2) * 2;
                    y = Math.sin(theta2) * Math.sin(phi2) * 2;
                    z = Math.cos(phi2) * 2;

                } else if (type === 'torus') {
                    const u2 = t;
                    const v2 = (i % 100) / 100 * Math.PI * 2;
                    const R = 2, r2 = 0.7;
                    x = (R + r2 * Math.cos(v2)) * Math.cos(u2);
                    y = (R + r2 * Math.cos(v2)) * Math.sin(u2);
                    z = r2 * Math.sin(v2);

                } else if (type === 'star') {
                    const spikes = 6;
                    const angle2 = t * spikes;
                    const inner = 0.8, outer = 2.0;
                    const rad2 = (i % 2 === 0) ? outer : inner;
                    x = Math.cos(angle2) * rad2;
                    y = Math.sin(angle2) * rad2;
                    z = (Math.random() - 0.5) * 0.5;

                } else if (type === 'dna') {
                    const strand = i % 2;
                    const h = (n - 0.5) * 6;
                    const angle3 = h * 2 + strand * Math.PI;
                    x = Math.cos(angle3) * 1.2;
                    y = h;
                    z = Math.sin(angle3) * 1.2;

                } else if (type === 'tree') {
                    const level = Math.floor(n * 5);
                    const spread = Math.pow(1.5, level) * 0.3;
                    x = (Math.random() - 0.5) * spread;
                    y = level * 0.6 - 1.5;
                    z = (Math.random() - 0.5) * spread;

                } else if (type === 'tornado') {
                    const h2 = (n - 0.5) * 5;
                    const rad3 = Math.abs(h2) * 0.4 + 0.1;
                    const ang = t * 10 + h2 * 3;
                    x = Math.cos(ang) * rad3;
                    y = h2;
                    z = Math.sin(ang) * rad3;

                } else if (type === 'infinity') {
                    const scale2 = 2;
                    x = scale2 * Math.cos(t) / (1 + Math.sin(t) * Math.sin(t));
                    y = scale2 * Math.sin(t) * Math.cos(t) / (1 + Math.sin(t) * Math.sin(t));
                    z = (Math.random() - 0.5) * 0.4;

                } else if (type === 'butterfly') {
                    const exp = Math.exp(Math.cos(t)) - 2 * Math.cos(4 * t) - Math.pow(Math.sin(t / 12), 5);
                    x = Math.sin(t) * exp * 0.5;
                    y = Math.cos(t) * exp * 0.5;
                    z = (Math.random() - 0.5) * 0.4;

                } else if (type === 'diamond') {
                    const phi3 = Math.acos(-1 + 2 * n);
                    const theta3 = Math.sqrt(particleCount * Math.PI) * phi3;
                    x = Math.cos(theta3) * Math.sin(phi3) * 1.5;
                    y = Math.sin(theta3) * Math.sin(phi3) * 2.5;
                    z = Math.cos(phi3) * 1.5;

                } else if (type === 'comet') {
                    const tail = Math.pow(n, 0.3) * 4;
                    x = tail * (Math.random() - 0.5) * 0.3;
                    y = -n * 3 + 1.5;
                    z = tail * (Math.random() - 0.5) * 0.3;

                } else if (type === 'phoenix') {
                    const wing = Math.sin(t * 3) * 2;
                    x = Math.cos(t) * wing;
                    y = Math.sin(t * 2) * 1.5;
                    z = Math.cos(t * 3) * 0.5;

                } else if (type === 'lissajous') {
                    const a = 3, b = 4, delta = Math.PI / 4;
                    x = 2 * Math.sin(a * t + delta);
                    y = 2 * Math.sin(b * t);
                    z = (Math.random() - 0.5) * 0.3;

                } else if (type === 'helix') {
                    const strands = 3;
                    const strand2 = i % strands;
                    const h3 = (n - 0.5) * 6;
                    const ang2 = h3 * 2 + (strand2 / strands) * Math.PI * 2;
                    x = Math.cos(ang2) * 1.5;
                    y = h3;
                    z = Math.sin(ang2) * 1.5;

                } else if (type === 'mandala') {
                    const petals2 = 8;
                    const layer = Math.floor(n * petals2);
                    const layerT = (n * petals2 - layer) * Math.PI * 2;
                    const baseAng = (layer / petals2) * Math.PI * 2;
                    const rad4 = 1 + Math.sin(layerT * 3) * 0.5;
                    x = Math.cos(baseAng + layerT * 0.1) * rad4;
                    y = Math.sin(baseAng + layerT * 0.1) * rad4;
                    z = Math.cos(layerT * 5) * 0.2;

                } else if (type === 'supernova') {
                    const rad5 = Math.pow(Math.random(), 0.3) * 3;
                    const phi4 = Math.acos(-1 + 2 * Math.random());
                    const theta4 = Math.random() * Math.PI * 2;
                    x = rad5 * Math.sin(phi4) * Math.cos(theta4);
                    y = rad5 * Math.sin(phi4) * Math.sin(theta4);
                    z = rad5 * Math.cos(phi4);

                } else if (type === 'vortex') {
                    const h4 = (n - 0.5) * 5;
                    const rad6 = (1 - Math.abs(n - 0.5) * 1.5) * 2;
                    const ang3 = t * 8 + h4 * 2;
                    x = Math.cos(ang3) * Math.max(0.1, rad6);
                    y = h4;
                    z = Math.sin(ang3) * Math.max(0.1, rad6);

                } else if (type === 'ribbon') {
                    const u3 = t;
                    const v3 = (n % (1/50)) * 50 * 2 - 1;
                    x = (1 + v3 * 0.3 * Math.cos(u3 / 2)) * Math.cos(u3) * 2;
                    y = (1 + v3 * 0.3 * Math.cos(u3 / 2)) * Math.sin(u3) * 2;
                    z = v3 * 0.3 * Math.sin(u3 / 2) * 2;

                } else if (type === 'crown') {
                    const spikes2 = 8;
                    const ang4 = (i % spikes2) / spikes2 * Math.PI * 2;
                    const layer2 = Math.floor(n * spikes2) / spikes2;
                    const up = Math.sin(ang4 * spikes2) > 0 ? 1 : 0;
                    x = Math.cos(ang4) * 2;
                    y = up * 1.5 * n + 0.5;
                    z = Math.sin(ang4) * 2;

                } else if (type === 'jellyfish') {
                    const bell = Math.cos(t * 2) * 1.5;
                    const h5 = n < 0.5 ? Math.sqrt(1 - Math.pow(n * 2, 2)) * 1.5 : -(n - 0.5) * 4;
                    x = Math.cos(t) * (1.5 + Math.sin(h5));
                    y = h5;
                    z = Math.sin(t) * (1.5 + Math.sin(h5));

                } else if (type === 'dragonfly') {
                    const wing2 = Math.abs(Math.sin(t * 2)) * 2;
                    x = Math.cos(t) * wing2;
                    y = Math.sin(t * 4) * 0.5;
                    z = Math.sin(t) * wing2;

                } else if (type === 'rose') {
                    const k = 5;
                    const rad7 = Math.cos(k * t) * 2;
                    x = rad7 * Math.cos(t);
                    y = rad7 * Math.sin(t);
                    z = Math.sin(k * t) * 0.5;

                } else if (type === 'nautilus') {
                    const a2 = 0.2;
                    const rad8 = Math.pow(Math.E, a2 * t) * 0.3;
                    x = rad8 * Math.cos(t);
                    y = rad8 * Math.sin(t);
                    z = (Math.random() - 0.5) * 0.5;

                } else if (type === 'hypercube') {
                    const binary = i % 16;
                    const bx = (binary & 1) ? 1.5 : -1.5;
                    const by = (binary & 2) ? 1.5 : -1.5;
                    const bz = (binary & 4) ? 1.5 : -1.5;
                    const bw = (binary & 8) ? 0.5 : -0.5;
                    x = bx + bw * 0.3 + (Math.random() - 0.5) * 0.4;
                    y = by + bw * 0.3 + (Math.random() - 0.5) * 0.4;
                    z = bz + bw * 0.3 + (Math.random() - 0.5) * 0.4;

                } else if (type === 'mobius') {
                    const u4 = t;
                    const v4 = (n % (1/100)) * 100 * 2 - 1;
                    x = (2 + v4 * 0.5 * Math.cos(u4 / 2)) * Math.cos(u4);
                    y = (2 + v4 * 0.5 * Math.cos(u4 / 2)) * Math.sin(u4);
                    z = v4 * 0.5 * Math.sin(u4 / 2);

                } else if (type === 'shockwave') {
                    const rad9 = Math.sqrt(n) * 3;
                    const ang5 = t * 20;
                    x = Math.cos(ang5) * rad9;
                    y = (Math.random() - 0.5) * 0.3;
                    z = Math.sin(ang5) * rad9;

                } else if (type === 'snowflake') {
                    const arm = i % 6;
                    const armAng = (arm / 6) * Math.PI * 2;
                    const dist = n * 2.5;
                    const branch = Math.round(dist * 3) / 3;
                    x = Math.cos(armAng) * branch + Math.cos(armAng + Math.PI / 3) * (dist - branch) * 0.3;
                    y = Math.sin(armAng) * branch + Math.sin(armAng + Math.PI / 3) * (dist - branch) * 0.3;
                    z = (Math.random() - 0.5) * 0.1;

                } else if (type === 'lotus') {
                    const petals3 = 8;
                    const petalIdx = i % petals3;
                    const petalAng = (petalIdx / petals3) * Math.PI * 2;
                    const petalT = n * Math.PI;
                    const rad10 = Math.sin(petalT) * 2;
                    x = Math.cos(petalAng) * rad10 + Math.cos(petalAng) * Math.cos(petalT) * 0.5;
                    y = Math.sin(petalT) * 0.8 - 0.5;
                    z = Math.sin(petalAng) * rad10 + Math.sin(petalAng) * Math.cos(petalT) * 0.5;

                } else if (type === 'hourglass') {
                    const h6 = (n - 0.5) * 4;
                    const rad11 = Math.abs(h6) * 0.8 + 0.1;
                    const ang6 = t * 10;
                    x = Math.cos(ang6) * rad11;
                    y = h6;
                    z = Math.sin(ang6) * rad11;

                } else if (type === 'volcano') {
                    if (n < 0.6) {
                        const h7 = n * 2.5;
                        const rad12 = h7 * 0.8;
                        const ang7 = t * 15;
                        x = Math.cos(ang7) * rad12;
                        y = -h7 + 0.5;
                        z = Math.sin(ang7) * rad12;
                    } else {
                        const eject = (n - 0.6) * 2.5;
                        const ang8 = t * 30;
                        x = Math.cos(ang8) * eject * 0.5;
                        y = eject * 2 + 0.5;
                        z = Math.sin(ang8) * eject * 0.5;
                    }

                } else {
                    x = (Math.random() - 0.5) * 10 * strength;
                    y = (Math.random() - 0.5) * 10 * strength;
                    z = (Math.random() - 0.5) * 10 * strength;
                }

                positions[i * 3]     += (x - positions[i * 3])     * 0.5;
                positions[i * 3 + 1] += (y - positions[i * 3 + 1]) * 0.5;
                positions[i * 3 + 2] += (z - positions[i * 3 + 2]) * 0.5;
            }
            geometry.attributes.position.needsUpdate = true;
        }

        function isOneFingerPoint(lm) {
            const indexUp  = lm[8].y  < lm[6].y;
            const middleUp = lm[12].y < lm[10].y;
            const ringUp   = lm[16].y < lm[14].y;
            const pinkyUp  = lm[20].y < lm[18].y;
            const pointingForward = (lm[8].z - lm[5].z) < -0.04;
            return indexUp && !middleUp && !ringUp && !pinkyUp && pointingForward;
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];

                const dx = landmarks[4].x - landmarks[8].x;
                const dy = landmarks[4].y - landmarks[8].y;
                const pinchDist = Math.sqrt(dx * dx + dy * dy);
                const isPinched = pinchDist < 0.05;

                if (isPinched) {
                    currentZoom += (ZOOM_OUT_Z - currentZoom) * 0.08;
                } else {
                    currentZoom += (ZOOM_IN_Z  - currentZoom) * 0.08;
                }
                camera.position.z = currentZoom;

                const now = Date.now();
                if (isOneFingerPoint(landmarks) && (now - lastShapeChange) > SHAPE_COOLDOWN) {
                    currentShape = (currentShape + 1) % shapes.length;
                    lastShapeChange = now;
                }

                updateShape(shapes[currentShape], 1);

                const colors = geometry.attributes.color.array;
                for (let i = 0; i < colors.length; i += 3) {
                    colors[i]   = landmarks[8].x;
                    colors[i+1] = landmarks[8].y;
                    colors[i+2] = 1 - landmarks[8].x;
                }
                geometry.attributes.color.needsUpdate = true;

            } else {
                updateShape('fireworks', 0.5);
            }
        });

        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });
        cameraFeed.start();

        function animate() {
            requestAnimationFrame(animate);
            particles.rotation.y += 0.002;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        initThree();
        animate();
    </script>
</body>
</html>
