    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>3D Gesture Particle System</title>
        <style>
            body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
            canvas { display: block; }
            #info {
                position: absolute; top: 10px; left: 10px; color: white;
                pointer-events: none; text-shadow: 1px 1px 2px black;
            }
            #video-container { position: absolute; bottom: 10px; right: 10px; width: 160px; height: 120px; border: 2px solid #444; }
            video { transform: scaleX(-1); width: 100%; height: 100%; object-fit: cover; }
        </style>
    </head>
    <body>
    
        <div id="info">
            Jitarth Satija - Gesture Control System<br>
            Pinch: Expand | Open Palm: Change Shape
        </div>
        <div id="video-container">
            <video id="input_video"></video>
        </div>
    
        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    
        <script>
            const videoElement = document.getElementById('input_video');
            let scene, camera, renderer, particles, geometry;
            let particleCount = 15000;
            let currentShape = 0;
            let lastPalmState = false;
            const shapes = ['fireworks', 'heart', 'flower', 'spiral', 'wave', 'saturn'];    
            // Init Three.js
            function initThree() {
                scene = new THREE.Scene();
                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 5;
    
                renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                document.body.appendChild(renderer.domElement);
    
                geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(particleCount * 3);
                const colors = new Float32Array(particleCount * 3);
    
                for (let i = 0; i < particleCount * 3; i++) {
                    positions[i] = (Math.random() - 0.5) * 10;
                    colors[i] = Math.random();
                }
    
                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    
                const material = new THREE.PointsMaterial({
                    size: 0.05,
                    vertexColors: true,
                    transparent: true,
                    blending: THREE.AdditiveBlending
                });
    
                particles = new THREE.Points(geometry, material);
                scene.add(particles);
            }
    
            // Mathematical Shape Generators
            function updateShape(type, strength = 1) {
                const positions = geometry.attributes.position.array;
                for (let i = 0; i < particleCount; i++) {
                    let x, y, z;
                    const t = i / particleCount * Math.PI * 2;
                    const r = 2 + Math.random() * 0.5 * strength;
    
                    if (type === 'heart') {
                        x = 16 * Math.pow(Math.sin(t), 3) / 10;
                        y = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) / 10;
                        z = (Math.random() - 0.5) * strength;
                    } else if (type === 'flower') {
                        const petals = 5;
                        const radius = 2 * Math.cos(petals * t);
                        x = radius * Math.cos(t);
                        y = radius * Math.sin(t);
                        z = (Math.random() - 0.5) * strength;
                    } else if (type === 'spiral') {
                        const radius = 0.1 * i;
                        x = radius * Math.cos(t * 5);
                        y = radius * Math.sin(t * 5);
                        z = (i / particleCount) * 5;
                    } else if (type === 'wave') {
                        x = (i / particleCount) * 5 - 2.5;
                        y = Math.sin(x * 5 + performance.now() * 0.002);
                        z = Math.cos(x * 5);
                    }
                    else if (type === 'saturn') {
                        if (i < particleCount * 0.6) { // Planet
                            const phi = Math.acos(-1 + (2 * i) / (particleCount * 0.6));
                            const theta = Math.sqrt(particleCount * 0.6 * Math.PI) * phi;
                            x = Math.cos(theta) * Math.sin(phi) * 1.5;
                            y = Math.sin(theta) * Math.sin(phi) * 1.5;
                            z = Math.cos(phi) * 1.5;
                        } else { // Rings
                            const ringR = 2.5 + Math.random() * 1.5;
                            x = Math.cos(t * 50) * ringR;
                            y = Math.sin(t * 50) * ringR * 0.3;
                            z = Math.sin(t * 50) * ringR * 0.5;
                        }
                    } else { // Fireworks / Default
                        x = (Math.random() - 0.5) * 10 * strength;
                        y = (Math.random() - 0.5) * 10 * strength;
                        z = (Math.random() - 0.5) * 10 * strength;
                    }
    
                    positions[i * 3] += (x - positions[i * 3]) * 0.1;
                    positions[i * 3 + 1] += (y - positions[i * 3 + 1]) * 0.1;
                    positions[i * 3 + 2] += (z - positions[i * 3 + 2]) * 0.1;
                }
                geometry.attributes.position.needsUpdate = true;
            }
    
            // Hand Tracking Logic
            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });
    
            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });
    
            hands.onResults((results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const landmarks = results.multiHandLandmarks[0];
                    
                    // Pinch detection (Thumb tip to Index tip)
                    const dx = landmarks[4].x - landmarks[8].x;
                    const dy = landmarks[4].y - landmarks[8].y;
                    const distance = Math.sqrt(dx*dx + dy*dy);
                    
                    // Interaction
                    const strength = distance < 0.05 ? 5 : 1; 
                    
                    // Palm Open to change shape
                    const isPalmOpen = landmarks[12].y < landmarks[9].y;
                    
                    if (isPalmOpen && !lastPalmState) {
                        currentShape = (currentShape + 1) % shapes.length;
                    }
                    
                    lastPalmState = isPalmOpen;
    
                    updateShape(shapes[currentShape], strength);
                    
                    // Dynamic Color change
                    const colors = geometry.attributes.color.array;
                    for(let i=0; i<colors.length; i+=3) {
                        colors[i] = landmarks[8].x; // Red based on hand X
                        colors[i+1] = landmarks[8].y; // Green based on hand Y
                        colors[i+2] = 1 - landmarks[8].x;
                    }
                    geometry.attributes.color.needsUpdate = true;
                } else {
                    updateShape('fireworks', 0.5);
                    lastPalmState = false;
                }
            });
    
            const cameraFeed = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({ image: videoElement });
                },
                width: 640,
                height: 480
            });
            cameraFeed.start();
    
            function animate() {
                requestAnimationFrame(animate);
                particles.rotation.y += 0.002;
                renderer.render(scene, camera);
            }
    
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
    
            initThree();
            animate();
        </script>
    </body>
    </html>
