<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jitarth 3D Particle Gesture</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        #overlay {
            position: absolute; top: 20px; left: 20px; color: #00ffff;
            pointer-events: none; background: rgba(0,0,0,0.7); padding: 15px;
            border: 1px solid #00ffff; border-radius: 5px;
        }
        #video-container { position: absolute; bottom: 20px; right: 20px; width: 180px; height: 135px; border: 2px solid #00ffff; border-radius: 10px; overflow: hidden; }
        video { transform: scaleX(-1); width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="overlay">
        SYSTEM: JITARTH SATIJA<br>
        STATUS: ACTIVE<br>
        <span style="color: white; font-size: 0.9em;">- Spread Fingers: ZOOM / EXPAND<br>- Pinch Fingers: UNZOOM / CONTRACT</span>
    </div>
    <div id="video-container">
        <video id="input_video"></video>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        const videoElement = document.getElementById('input_video');
        let scene, camera, renderer, particles, geometry;
        let particleCount = 15000;
        let currentShape = 0;
        const shapes = ['fireworks', 'heart', 'flower', 'saturn'];

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 6;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount * 3; i++) {
                positions[i] = (Math.random() - 0.5) * 10;
                colors[i] = Math.random();
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.04,
                vertexColors: true,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }

        function updateShape(type, strength = 1) {
            const positions = geometry.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                let x, y, z;
                const t = (i / particleCount) * Math.PI * 2;

                if (type === 'heart') {
                    x = (16 * Math.pow(Math.sin(t), 3) / 10) * strength;
                    y = ((13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) / 10) * strength;
                    z = (Math.random() - 0.5) * 0.2 * strength;
                } else if (type === 'flower') {
                    const r = (2.5 * Math.cos(6 * t)) * strength;
                    x = r * Math.cos(t);
                    y = r * Math.sin(t);
                    z = (Math.random() - 0.5) * 0.5;
                } else if (type === 'saturn') {
                    if (i < particleCount * 0.6) {
                        const phi = Math.acos(-1 + (2 * i) / (particleCount * 0.6));
                        const theta = Math.sqrt(particleCount * 0.6 * Math.PI) * phi;
                        x = Math.cos(theta) * Math.sin(phi) * 1.5 * strength;
                        y = Math.sin(theta) * Math.sin(phi) * 1.5 * strength;
                        z = Math.cos(phi) * 1.5 * strength;
                    } else {
                        const ringR = (3 + Math.random() * 1.5) * strength;
                        x = Math.cos(t * 60) * ringR;
                        y = Math.sin(t * 60) * ringR * 0.2;
                        z = Math.sin(t * 60) * ringR * 0.4;
                    }
                } else {
                    x = (Math.random() - 0.5) * 10 * strength;
                    y = (Math.random() - 0.5) * 10 * strength;
                    z = (Math.random() - 0.5) * 10 * strength;
                }

                positions[i * 3] += (x - positions[i * 3]) * 0.12;
                positions[i * 3 + 1] += (y - positions[i * 3 + 1]) * 0.12;
                positions[i * 3 + 2] += (z - positions[i * 3 + 2]) * 0.12;
            }
            geometry.attributes.position.needsUpdate = true;
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                const dx = landmarks[4].x - landmarks[8].x;
                const dy = landmarks[4].y - landmarks[8].y;
                const distance = Math.sqrt(dx*dx + dy*dy);
                
                // CORRECTED LOGIC:
                // distance badha (Unpinch) -> strength badhegi (Zoom/Expand)
                // distance kam (Pinch) -> strength kam hogi (Unzoom/Contract)
                let strength = distance * 12; 
                if (strength < 0.4) strength = 0.2; // Minimum size during pinch

                // Change shape with palm open gesture
                const isPalmOpen = landmarks[12].y < landmarks[9].y && landmarks[8].y < landmarks[5].y;
                if (isPalmOpen && Math.random() > 0.99) {
                    currentShape = (currentShape + 1) % shapes.length;
                }

                updateShape(shapes[currentShape], strength);
                
                // Dynamic colors based on hand movement
                const colors = geometry.attributes.color.array;
                for(let i=0; i<colors.length; i+=3) {
                    colors[i] = landmarks[4].x; 
                    colors[i+1] = 1 - landmarks[4].y;
                    colors[i+2] = distance * 2;
                }
                geometry.attributes.color.needsUpdate = true;
            }
        });

        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });
        cameraFeed.start();

        function animate() {
            requestAnimationFrame(animate);
            particles.rotation.y += 0.002;
            particles.rotation.x += 0.001;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        initThree();
        animate();
    </script>
</body>
</html>
